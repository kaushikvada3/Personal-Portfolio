# Deploys Portfolio Cinema (Portfolio.html + graph-fly.js + graph.json) to GitHub Pages.
name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
      - eda-tool-theme
    paths:
      - 'Portfolio.html'
      - 'graph-fly.js'
      - 'graph.json'
      - '.github/workflows/deploy-portfolio-v2.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp Portfolio.html _site/index.html
          cp graph-fly.js _site/graph-fly.js
          cp graph.json _site/graph.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
