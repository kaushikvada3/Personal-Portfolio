# GitHub Pages serves ONLY the Vite production build from Portfolio v2/docs
# (not the repo root, not Portfolio v3). Build output path is fixed in the job below.
name: Deploy Portfolio v2 to GitHub Pages

on:
  push:
    branches:
      - main
      - eda-tool-theme
    paths:
      - 'Portfolio v2/**'
      - '.github/workflows/deploy-portfolio-v2.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Portfolio v2/package-lock.json

      - name: Install dependencies
        working-directory: Portfolio v2
        run: npm ci

      - name: Build Vite site
        working-directory: Portfolio v2
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Portfolio v2/docs

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
